name: Release Mod
on:
   push:
   # pull_request:
   #   branches:
   #     - main

jobs:
   buildJar:
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v2

         - name: Set up PATH
           run: |
              echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

         - name: Set up JDK 17
           uses: actions/setup-java@v1
           with:
              java-version: 17

         - name: Build mod jar
           run: ./gradlew deploy

         - name: Upload built jar file
           uses: actions/upload-artifact@v4
           with:
              name: ${{ github.event.repository.name }}
              path: build/libs/${{ github.event.repository.name }}.jar

         - name: Install hjson
           run: npm install -g hjson

         - name: Read version
           id: version
           run: |
              VERSION=$(hjson -j mod.hjson | node -e "
                let d = '';
                process.stdin.on('data', c => d += c);
                process.stdin.on('end', () => {
                  const v = JSON.parse(d).version;
                  if (!v) { process.exit(1); }
                  process.stdout.write(String(v));
                });
              ")

              if [[ -z "$VERSION" ]]; then
                echo "::error::Could not read a 'version' field from mod.hjson"
                exit 1
              fi

              if [[ "${{ github.ref_name }}" != "main" ]]; then
                VERSION="${VERSION}-beta"
              fi

              echo "Resolved release tag: $VERSION"
              echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

         - name: Create release
           if: steps.version.outputs.tag != ''
           uses: softprops/action-gh-release@v2
           with:
              tag_name: "${{ steps.version.outputs.tag }}"
              name: "${{ steps.version.outputs.tag }}"
              prerelease: ${{ github.ref_name != 'main' }}
              files: |
                 build/libs/${{ github.event.repository.name }}.jar
           env:
              GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
